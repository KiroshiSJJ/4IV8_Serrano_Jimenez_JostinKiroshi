<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer ejercicio de los 10</title>
</head>
<body>
    <div class="Ejercicio 1" >
        <form method="post" id="formularioejer1" name="formularioejer1" action="">
            <label for="">
                Formulario para calcular una inversion al x% de interes anual
            </label>
            <div class="container-table">
                <table class="table">
                    <tr>
                        <td>
                            Introduce la cantidad que deseas invertir por todo 1 año:
                        </td>
                        <td>
                            <input type="text" name="cantidad" id="cantidadi" onkeypress="return validarn(event)">
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <input type="button" value="Calcular interes" name="enviar" onclick="interes()">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Su saldo es de:
                        </td>
                        <td>
                            <input type="text" name="sueldoi" id="sueldoi" readonly="readonly" >
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <input type="button" value="Borrar Datos" name="delete" onclick="borrar()">
                        </td>
                    </tr>
                </table>
            </div>
        </form>
    </div>
    <script src="./js/interes.js"></script>
    <a href="../index.html" style="
    display: inline-block; 
    padding: 12px 25px; 
    background-color: #FFFFFF; 
    color: #0066CC; 
    text-decoration: none; 
    border-radius: 8px; 
    font-family: 'Helvetica', sans-serif; 
    font-weight: bold; 
    margin: 15px; 
    border: 2px solid #0066CC;
    box-shadow: 0 4px 6px rgba(0, 102, 204, 0.1);
    transition: all 0.3s ease;
    cursor: pointer;">
    Volver al Portafolio</a>

    <style>
        a:hover {
            background-color: #0066CC !important;
            color: #FFFFFF !important;
            box-shadow: 0 6px 12px rgba(0, 102, 204, 0.2);
            transform: translateY(-2px);
        }
    </style>
</body>
</html>
